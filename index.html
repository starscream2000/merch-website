<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merch Shop</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f9f9f9;
            color: #333;
            text-align: center;
        }
        header {
            background-color: #111;
            color: #fff;
            padding: 60px 20px;
        }
        header h1 {
            margin: 0;
            font-size: 2.5rem;
        }
        header p {
            color: #aaa;
            margin-top: 10px;
        }
        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .coming-soon {
            background: #fff;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .btn {
            display: inline-block;
            background-color: #0070f3;
            color: white;
            padding: 12px 24px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Merch Official</h1>
        <p>Welcome to our official domain</p>
    </header>

    <div class="container">
        <div class="coming-soon">
            <h2>Something amazing is in the works!</h2>
            <p>We are currently setting up our brand new web space. Stay tuned for exciting updates, clips, and releases.</p>
            <a href="#" class="btn">Learn More</a>
        </div>
    </div>

</body>
</html>
